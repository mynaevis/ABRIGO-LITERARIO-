services:
  - type: web
    name: abrigo-literario
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false # Você deve definir sua chave de API nos detalhes do serviço no Render
